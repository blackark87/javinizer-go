name: Stale Issues

# Closes issues with no activity to keep the tracker actionable. Runs daily.
# Policy:
#   - Mark stale after 60 days of inactivity (no comments, commits, etc.)
#   - Close 7 days after being marked stale (grace window for the reporter
#     to bump or clarify)
#   - Never stale: pinned issues, issues with an assignee or milestone, and
#     issues labelled help-wanted / good-first-issue / wontfix / security /
#     roadmap (these are deliberate keepers)
#   - Issues only — PRs are not touched (in-progress work)

on:
  schedule:
    # 01:00 UTC daily (low-traffic window; the repo is JP-centric so this
    # is late morning local, after the day's first triage)
    - cron: "0 1 * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  issues: write

concurrency:
  group: stale-issues
  cancel-in-progress: false

jobs:
  stale:
    name: Mark & close stale issues
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          # only issues, never PRs
          days-before-issue-stale: 60
          days-before-issue-close: 7
          days-before-pr-stale: -1
          days-before-pr-close: -1

          # process the whole backlog in one run (repo is small)
          operations-per-run: 100

          stale-issue-label: stale
          close-issue-reason: not_planned

          # keepers — deliberate signals that an issue should stay open
          exempt-issue-labels: >-
            help wanted,
            good first issue,
            wontfix,
            security,
            roadmap,
            pinned
          exempt-all-issue-assignees: true
          exempt-all-issue-milestones: true

          # bumping an issue (comment) resets the clock
          only-issue-labels: ""
          remove-issue-stale-when-updated: true

          stale-issue-message: >-
            This issue has been inactive for 60 days and is being marked
            stale. It will be closed in 7 days unless there is new activity.
            If this is still relevant, leave a comment or add the
            `help wanted` / `roadmap` label to keep it open.

          close-issue-message: >-
            Closing this issue due to inactivity. If the problem is still
            relevant, please open a new issue with up-to-date details
            (javinizer version, config, scraper, and reproduction steps)
            and reference this one.
